name: Release Package

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  build:
    name: Build release zip
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 25
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Build executable jar
        run: mvn -B -DskipTests package spring-boot:repackage

      - name: Package release archive
        shell: bash
        run: |
          set -euo pipefail

          tag_name="${GITHUB_REF_NAME}"
          package_name="stellorbit-service-${tag_name}"
          package_dir="dist/${package_name}"

          mkdir -p "${package_dir}"

          jar_file="$(find target -maxdepth 1 -type f -name '*.jar' ! -name 'original-*.jar' | head -n 1)"
          if [[ -z "${jar_file}" ]]; then
            echo "No executable jar found under target/" >&2
            exit 1
          fi

          cp "${jar_file}" "${package_dir}/stellorbit-service.jar"
          cp src/main/resources/application.yml "${package_dir}/application.yaml"

          (cd dist && zip -r "${package_name}.zip" "${package_name}")

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: stellorbit-service-${{ github.ref_name }}
          path: dist/stellorbit-service-${{ github.ref_name }}.zip
          if-no-files-found: error

      - name: Upload GitHub release asset
        uses: softprops/action-gh-release@v2
        with:
          files: dist/stellorbit-service-${{ github.ref_name }}.zip
